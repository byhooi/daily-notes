<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self' https://cdn.jsdelivr.net; img-src 'self' data: https:;">
    <title>每日积累 - 内容生成</title>

    <link rel="stylesheet" href="assets/tailwind.min.css">
    <link rel="stylesheet" href="assets/common.css">

    <!-- CDN 预连接 -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>

    <!-- 霞鹭文楷字体 - 非阻塞加载 -->
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.1.0/style.css" as="style"
        onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.1.0/style.css">
    </noscript>

    <style>
        /* Admin-specific CSS variables */
        :root {
            --input-bg: #ffffff;
            --input-border: #e2e8f0;
            --button-bg: #48bb78;
            /* Green button */
            --button-text: #ffffff;
            --button-hover-bg: #38a169;
            /* Darker green */
            --copy-button-bg: #4299e1;
            /* Blue button */
            --copy-button-hover-bg: #3182ce;
            /* Darker blue */
            --pre-bg: #edf2f7;
        }

        [data-theme="dark"] {
            --input-bg: #2d3748;
            --input-border: #4a5568;
            --button-bg: #68d391;
            /* Lighter green button */
            --button-hover-bg: #48bb78;
            /* Original green */
            --copy-button-bg: #63b3ed;
            /* Lighter blue button */
            --copy-button-hover-bg: #4299e1;
            /* Original blue */
            --pre-bg: #4a5568;
        }

        body {
            font-family: 'LXGW WenKai', 'STKaiti', 'KaiTi', 'Noto Sans SC', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'WenQuanYi Micro Hei', 'Droid Sans Fallback', 'Heiti SC', 'SimSun', sans-serif;
        }

        .card {
            color: var(--text-color);
        }

        .theme-toggle {
            background-color: var(--card-background);
            border: 1px solid var(--border-color);
        }

        .theme-toggle:hover {
            color: var(--accent-color);
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 0.375rem;
            /* 6px */
            border: 1px solid var(--input-border);
            background-color: var(--input-bg);
            color: var(--text-color);
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(72, 187, 120, 0.2);
            /* Accent color focus ring */
            border-color: var(--accent-color);
        }

        .form-label {
            display: block;
            font-weight: 500;
            /* medium */
            margin-bottom: 0.5rem;
            /* mb-2 */
            color: var(--text-color);
        }

        .btn {
            padding: 0.5rem 1rem;
            /* px-4 py-2 */
            border-radius: 0.375rem;
            /* rounded */
            font-size: 0.875rem;
            /* text-sm */
            font-weight: 500;
            color: var(--button-text);
            transition: background-color 0.2s ease;
            cursor: pointer;
        }

        .btn-primary {
            background-color: var(--button-bg);
        }

        .btn-primary:hover {
            background-color: var(--button-hover-bg);
        }

        .btn-secondary {
            background-color: var(--copy-button-bg);
        }

        .btn-secondary:hover {
            background-color: var(--copy-button-hover-bg);
        }

        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            background-color: var(--pre-bg);
            color: var(--text-color);
            padding: 1rem;
            /* p-4 */
            border-radius: 0.375rem;
            /* rounded */
            font-size: 0.875rem;
            /* text-sm */
            border: 1px solid var(--border-color);
        }

        /* Adjust header link color */
        header a {
            color: var(--accent-color);
            transition: color 0.2s ease;
        }

        header a:hover {
            filter: brightness(1.1);
        }
    </style>
</head>

<body class="min-h-screen py-8">
    <button class="theme-toggle p-2 rounded-full" onclick="toggleTheme()">
        <svg class="icon-sun text-yellow-500" width="20" height="20" viewBox="0 0 512 512" fill="currentColor">
            <path
                d="M256 160c-52.9 0-96 43.1-96 96s43.1 96 96 96 96-43.1 96-96-43.1-96-96-96zm246.4 80.5l-94.7-47.3 33.5-100.4c4.5-13.6-8.4-26.5-21.9-21.9l-100.4 33.5-47.4-94.8c-6.4-12.8-24.6-12.8-31 0l-47.3 94.7L92.7 70.8c-13.6-4.5-26.5 8.4-21.9 21.9l33.5 100.4-94.7 47.4c-12.8 6.4-12.8 24.6 0 31l94.7 47.3-33.5 100.5c-4.5 13.6 8.4 26.5 21.9 21.9l100.4-33.5 47.3 94.7c6.4 12.8 24.6 12.8 31 0l47.3-94.7 100.4 33.5c13.6 4.5 26.5-8.4 21.9-21.9l-33.5-100.4 94.7-47.3c12.8-6.4 12.8-24.6 0-31z" />
        </svg>
    </button>

    <div class="container mx-auto px-4 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-bold mb-4">内容生成</h1>
            <a href="index.html" class="text-lg">返回首页</a>
        </header>

        <!-- 添加表单 -->
        <div class="card rounded-lg p-6 mb-8" style="opacity: 1; transform: translateY(0);">
            <form id="entryForm" class="space-y-6">
                <div>
                    <label for="dateInput" class="form-label">日期</label>
                    <input type="date" id="dateInput" class="form-input" required>
                </div>
                <div>
                    <label for="titleInput" class="form-label">标题（选填）</label>
                    <input type="text" id="titleInput" class="form-input" placeholder="请输入标题（可选）">
                </div>
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label for="contentInput" class="form-label" style="margin-bottom: 0;">内容（每行一个条目）</label>
                        <div class="flex items-center text-sm opacity-80 hover:opacity-100 transition-opacity">
                            <input type="checkbox" id="poetryMode" class="w-4 h-4 mr-2 cursor-pointer" style="accent-color: var(--button-bg);">
                            <label for="poetryMode" class="cursor-pointer" style="margin-bottom: 0;">诗歌模式（换行转/，空行转//）</label>
                        </div>
                    </div>

                    <!-- 功能提示 -->
                    <div class="mb-3 p-3 rounded-lg"
                        style="background-color: var(--pre-bg); border: 1px solid var(--border-color);">
                        <div class="flex items-center mb-2">
                            <svg width="16" height="16" viewBox="0 0 512 512" fill="currentColor" class="mr-2"
                                style="color: var(--accent-color); flex-shrink: 0;">
                                <path
                                    d="M256 8C119.043 8 8 119.083 8 256c0 136.997 111.043 248 248 248s248-111.003 248-248C504 119.083 392.957 8 256 8zm0 110c23.196 0 42 18.804 42 42s-18.804 42-42 42-42-18.804-42-42 18.804-42 42-42zm56 254c0 6.627-5.373 12-12 12h-88c-6.627 0-12-5.373-12-12v-24c0-6.627 5.373-12 12-12h12v-64h-12c-6.627 0-12-5.373-12-12v-24c0-6.627 5.373-12 12-12h64c6.627 0 12 5.373 12 12v100h12c6.627 0 12 5.373 12 12v24z" />
                            </svg>
                            <span class="font-medium">文字标红功能</span>
                        </div>
                        <p class="text-sm mb-2">使用 <code class="px-1 py-0.5 rounded text-xs"
                                style="background-color: var(--input-bg); border: 1px solid var(--input-border);">##文字##</code>
                            格式将文字标记为红色</p>
                        <div class="text-xs opacity-75">
                            示例：这是一个##重要##的词汇 → 这是一个<span class="highlight-red">重要</span>的词汇
                        </div>
                    </div>

                    <textarea id="contentInput" class="form-input h-48" required
                        placeholder="输入内容，每行一个条目...&#10;例如：今天天气很好，##阳光明媚##，适合外出游玩。"></textarea>
                    <div class="mt-4">
                        <button type="button" onclick="generateArrayItem()" class="btn btn-primary">
                            <svg width="14" height="14" viewBox="0 0 512 512" fill="currentColor" class="mr-1"
                                style="display:inline-block;vertical-align:middle;">
                                <path
                                    d="M487.4 315.7l-42.6-24.6c4.3-23.2 4.3-47 0-70.2l42.6-24.6c4.9-2.8 7.1-8.6 5.5-14-11.1-35.6-30-67.8-54.7-94.6-3.8-4.1-10-5.1-14.8-2.3L380.8 110c-17.9-15.4-38.5-27.3-60.8-35.1V25.8c0-5.6-3.9-10.5-9.4-11.7-36.7-8.2-74.3-7.8-109.2 0-5.5 1.2-9.4 6.1-9.4 11.7V75c-22.2 7.9-42.8 19.8-60.8 35.1L88.7 85.5c-4.9-2.8-11-1.9-14.8 2.3-24.7 26.7-43.6 58.9-54.7 94.6-1.7 5.4.6 11.2 5.5 14L67.3 221c-4.3 23.2-4.3 47 0 70.2l-42.6 24.6c-4.9 2.8-7.1 8.6-5.5 14 11.1 35.6 30 67.8 54.7 94.6 3.8 4.1 10 5.1 14.8 2.3l42.6-24.6c17.9 15.4 38.5 27.3 60.8 35.1v49.2c0 5.6 3.9 10.5 9.4 11.7 36.7 8.2 74.3 7.8 109.2 0 5.5-1.2 9.4-6.1 9.4-11.7v-49.2c22.2-7.9 42.8-19.8 60.8-35.1l42.6 24.6c4.9 2.8 11 1.9 14.8-2.3 24.7-26.7 43.6-58.9 54.7-94.6 1.5-5.5-.7-11.3-5.6-14.1zM256 336c-44.1 0-80-35.9-80-80s35.9-80 80-80 80 35.9 80 80-35.9 80-80 80z" />
                            </svg> 生成内容
                        </button>
                    </div>
                </div>
            </form>
        </div>

        <!-- 预览区域 -->
        <div class="card rounded-lg p-6" style="opacity: 1; transform: translateY(0);">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-bold">数组内容预览</h2>
                <button onclick="copyContent()" class="btn btn-secondary">
                    <svg width="14" height="14" viewBox="0 0 448 512" fill="currentColor" class="mr-1"
                        style="display:inline-block;vertical-align:middle;">
                        <path
                            d="M320 448v40c0 13.255-10.745 24-24 24H24c-13.255 0-24-10.745-24-24V120c0-13.255 10.745-24 24-24h72v296c0 30.879 25.121 56 56 56h168zm0-344V0H152c-13.255 0-24 10.745-24 24v368c0 13.255 10.745 24 24 24h272c13.255 0 24-10.745 24-24V128H344c-13.2 0-24-10.8-24-24zm120.971-31.029L375.029 7.029A24 24 0 0 0 358.059 0H352v96h96v-6.059a24 24 0 0 0-7.029-16.97z" />
                    </svg> 复制内容
                </button>
            </div>
            <pre id="previewArea"></pre>
        </div>
    </div>

    <script src="assets/theme.js" charset="utf-8"></script>
    <script>
        // 获取元素
        const form = document.getElementById('entryForm');
        const dateInput = document.getElementById('dateInput');
        const titleInput = document.getElementById('titleInput');
        const contentInput = document.getElementById('contentInput');
        const previewArea = document.getElementById('previewArea');

        // HTML 转义函数，防止 XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 新增：辅助函数，处理高亮标记和全角转换
        function processLineForHighlightingAndFullWidth(line, toFullWidthFunc) {
            const parts = line.split(/(##.*?##)/g); // 按 ##标记## 分割，并保留标记部分
            let processedLine = "";
            for (const part of parts) {
                if (part.startsWith("##") && part.endsWith("##")) {
                    const highlightedText = part.substring(2, part.length - 2); // 提取标记内的文本
                    // 转义 HTML 后再包裹在 span 中
                    processedLine += `<span class='highlight-red'>${escapeHtml(toFullWidthFunc(highlightedText))}</span>`;
                } else {
                    processedLine += escapeHtml(toFullWidthFunc(part)); // 对非标记部分转义并应用全角转换
                }
            }
            return processedLine;
        }

        // 生成数组项
        function generateArrayItem() {
            const rawContent = contentInput.value;
            const lines = rawContent.split('\n').filter(line => line.trim());
            const isPoetryMode = document.getElementById('poetryMode') && document.getElementById('poetryMode').checked;

            if (!dateInput.value) {
                alert('请选择日期！');
                dateInput.focus();
                return;
            }
            if (!rawContent.trim()) {
                alert('请输入内容！');
                contentInput.focus();
                return;
            }

            // 半角转全角函数（保留数字和字母为半角，并在中英文/数字之间添加空格）
            function toFullWidth(str) {
                let result = "";

                // 辅助函数：判断是否为数字或英文字母
                function isAlphaNum(charCode) {
                    return (charCode >= 48 && charCode <= 57) ||  // 数字 0-9
                        (charCode >= 65 && charCode <= 90) ||  // 大写字母 A-Z
                        (charCode >= 97 && charCode <= 122);   // 小写字母 a-z
                }

                // 辅助函数：判断是否为中文字符
                function isChinese(charCode) {
                    return (charCode >= 0x4E00 && charCode <= 0x9FFF) ||  // 基本汉字
                        (charCode >= 0x3400 && charCode <= 0x4DBF) ||  // 扩展A
                        (charCode >= 0x20000 && charCode <= 0x2A6DF);  // 扩展B
                }

                for (let i = 0; i < str.length; i++) {
                    const charCode = str.charCodeAt(i);
                    const char = str[i];
                    const prevCharCode = i > 0 ? str.charCodeAt(i - 1) : null;
                    const nextCharCode = i < str.length - 1 ? str.charCodeAt(i + 1) : null;

                    // 保留数字 0-9 和字母 A-Z, a-z 为半角
                    if (isAlphaNum(charCode)) {
                        // 如果前一个字符是中文，且当前结果不以空格结尾，添加空格
                        if (prevCharCode && isChinese(prevCharCode) && !result.endsWith(' ')) {
                            result += ' ';
                        }
                        result += char;
                        // 如果下一个字符是中文，标记需要在后面加空格
                        if (nextCharCode && isChinese(nextCharCode)) {
                            result += ' ';
                        }
                    } else if (charCode > 32 && charCode < 127) {
                        // 只转换标点符号为全角
                        const punctuationMap = {
                            "!": "！", '"': '"', "#": "＃", "$": "＄", "%": "％", "&": "＆",
                            "'": "'", "(": "（", ")": "）", "*": "＊", "+": "＋", ",": "，",
                            "-": "－", ".": "．", "/": "／", ":": "：", ";": "；", "<": "＜",
                            "=": "＝", ">": "＞", "?": "？", "@": "＠", "[": "［", "\\": "＼",
                            "]": "］", "^": "＾", "_": "＿", "`": "｀", "{": "｛", "|": "｜",
                            "}": "｝", "~": "～"
                        };
                        result += punctuationMap[char] || char; // 如果不在映射中，保持原样
                    } else {
                        result += char;
                    }
                }
                return result;
            }

            let content;
            if (isPoetryMode) {
                // 诗歌模式：使用 / 和 // 分隔
                const paragraphs = rawContent.trim().split(/\n\s*\n+/);
                const processedParagraphs = paragraphs.map(p => {
                    const pLines = p.split('\n').map(l => l.trim()).filter(l => l);
                    return pLines.map(line => processLineForHighlightingAndFullWidth(line, toFullWidth)).join('/');
                });
                const finalStr = processedParagraphs.join('//');
                content = `"${finalStr.replace(/"/g, '\\"').replace(/`/g, '\\`')}"`;
            } else if (lines.length === 1) {
                // 使用新函数处理单行内容
                const processedSingleLine = processLineForHighlightingAndFullWidth(lines[0], toFullWidth);
                content = `"${processedSingleLine.replace(/"/g, '\\"').replace(/`/g, '\\`')}"`;
            } else {
                // 使用新函数处理多行内容
                const escapedLines = lines.map(line => `              <li>${processLineForHighlightingAndFullWidth(line, toFullWidth).replace(/`/g, '\\`')}</li>`).join('\n');
                content = `\`<ol class="list-decimal list-inside space-y-2">\n${escapedLines}\n            </ol>\``;
            }

            const parts = [
                `{`,
                `    date: "${dateInput.value}",`
            ];

            if (titleInput.value.trim()) {
                // 对标题也应用全角转换
                parts.push(`    title: "${toFullWidth(titleInput.value).replace(/"/g, '\\"')}",`);
            }

            parts.push(
                `    content: ${content}`,
                `  }`
            );

            previewArea.textContent = parts.join('\n');
        }

        // 复制内容到剪贴板
        function copyContent() {
            const content = previewArea.textContent;
            if (!content) {
                alert('请先生成内容！');
                return;
            }

            navigator.clipboard.writeText(content).then(() => {
                alert('内容已复制到剪贴板！');
                // Optional: Add visual feedback like changing button text/icon
            }).catch(err => {
                console.error('复制失败:', err);
                alert('复制失败，请手动复制。');
            });
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function () {
            initTheme(); // Set theme on load
            // Set default date
            if (!dateInput.value) {
                dateInput.value = new Date().toISOString().split('T')[0];
            }
        });
    </script>
</body>

</html>
